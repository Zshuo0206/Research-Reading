services:
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: ["npm", "run", "--workspace", "apps/api", "start"]
    environment:
      CONTAINER_MODE: "1"
      API_HOST: 0.0.0.0
      API_PORT: 4310
    ports:
      - "127.0.0.1:4310:4310"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4310/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: ["npm", "run", "--workspace", "apps/worker", "start"]
    environment:
      API_HOST: 127.0.0.1
  web:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: ["npm", "run", "--workspace", "apps/web", "start"]
    environment:
      CONTAINER_MODE: "1"
      WEB_HOST: 0.0.0.0
      WEB_PORT: 4173
    ports:
      - "127.0.0.1:4173:4173"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      - api
      - worker
