services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 4310
    ports:
      - "4310:4310"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4310/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
