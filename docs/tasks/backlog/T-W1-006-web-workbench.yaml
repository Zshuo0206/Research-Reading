task_id: T-W1-006
title: "实现单用户方法学习 Web 工作台"
owner_role: frontend-agent
status: DRAFT
wave: 1

objective: "在契约 Web 骨架之上提供创建项目、导入 PDF、选择方法学习、审阅问题和审阅带证据回答的最小 Web 交互。"
background: "产品验收需要用户实际确认、修改或拒绝问题和回答，而不仅是 API 可用。"
scope:
  - "实现项目创建、PDF 上传进度、文档/任务状态和错误重试。"
  - "实现问题 revision 审阅、逐项确认/拒绝和本地编辑。"
  - "实现回答 revision、断言类型、页码/稳定位置证据、verification 和确认/拒绝。"
  - "纳入模型设置页面：provider 预设/custom base_url、模型、连接测试和会话内存 API Key 输入；不持久化明文密钥。"
  - "覆盖 loading、empty、error、retry、success 和重复提交 pending 状态。"
out_of_scope:
  - "协作、权限管理、导出、资产库、多篇论文和其他阅读模式。"
dependencies:
  - task_id: T-W1-001
    reason: "前端类型和字段必须来自 wave1.v1。"
  - task_id: T-W1-005
    reason: "需要稳定 API 和状态机。"
  - task_id: T-W1-006A
    reason: "闭环页面在契约骨架基础上集成。"

writable_paths:
  - apps/web/src/features/**
  - apps/web/src/pages/**
  - apps/web/src/components/business/**
  - tests/e2e/web/**
read_only_paths:
  - packages/contracts/wave1/**
  - apps/api/**
  - apps/web/package.json
  - apps/web/tsconfig.json
  - apps/web/vite.config.ts
  - apps/web/host-policy.ts
  - apps/web/index.html
  - apps/web/src/main.tsx
forbidden_paths:
  - packages/contracts/**
  - package.json
  - apps/api/src/**
contract_version: "api.v1 + document.v1 + question-plan.v1 + answer.v1"

inputs:
  - name: "API 响应和用户操作"
    type: "versioned-api"
    source: "Wave 1 API"
outputs:
  - name: "可完成闭环的 Web 页面"
    type: "browser-ui"
    destination: "apps/web"

acceptance_criteria:
  - "用户不需要编辑 URL 或调用 API 即可完成最小闭环。"
  - "方法学习以外的模式不会进入真实流程。"
  - "问题和回答的 revision、review_status、verification_status、确认和拒绝操作清晰可见。"
  - "证据片段和页码/稳定位置与 API 返回一致。"
  - "不在日志、URL、错误提示中显示 token、原文或内部路径。"
required_tests:
  - "组件状态和表单校验测试。"
  - "PR Playwright smoke：loopback、项目、许可 fixture、方法学习、Mock 问题、确认问题、带证据回答和确认回答。"
  - "完整 Playwright 空库、成功、失败、重试和重复提交场景。"
  - "契约响应与前端类型一致性检查。"
manual_acceptance:
  - "QA 独立使用固定 PDF 走通浏览器闭环并记录截图/日志位置。"
security_considerations:
  - "上传由服务端最终校验；前端不能绕过模式和确认状态。"
  - "错误边界不展示模型原始响应或文件系统路径。"
risks:
  - risk: "UI 只展示模型文本而弱化证据和用户控制。"
    mitigation: "证据、断言类型和确认操作作为验收必需区域，不可隐藏。"
rollback_plan: "Web 可独立回退到上一个可构建版本；API 契约保持兼容。"
deliverables:
  - "方法学习最小 Web 工作台。"
  - "浏览器 E2E 证据。"
  - "前端交接报告。"
