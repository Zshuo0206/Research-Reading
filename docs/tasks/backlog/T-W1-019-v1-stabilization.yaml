acceptance_criteria:
  - "PDF 页码切换和相同页重触发均产生新的 iframe key；src 只有一个 #page，UI 有目标、加载/失败状态和新标签页入口。"
  - "Web mock 不在 GET 中隐式推进 Worker，transition 保留真实 from/to；真实本地 smoke 完成 API、Worker、PDF、Evidence 和恢复闭环。"
  - "Mock PAPER_FACT 只引用与 claim 确定性对应的 VERIFIED quote；无支持文本时为 INSUFFICIENT_EVIDENCE 且无引用。"
  - "所有主要 API 错误返回稳定 api.v1 envelope，不泄露内部异常；browser session-key 默认关闭。"
  - "Worker 初始化成功后才 ready；runOnce 瞬时失败有结构化日志和有界退避，abort/graceful stop 可靠。"
  - "Windows 本地脚本只管理自身进程，不输出 secret，启动失败可清理。"
  - "托管 stop 通过本次运行专属 control file 让 Worker 完成当前 Job 后退出，不再领取下一 Job；超时不强杀 Worker，且不声称支持 orphan recovery。"
  - "start/check/stop 固定使用 API 4310 与 Web 4173；端口冲突在启动进程前失败；ready 必须来自逐行解析的真实 Worker JSON。"
  - "Guided Learning 非法输入只返回 allowlist 中的 400/404/409 api.v1 错误；未知异常统一为不泄露内部信息的 500。"
  - "feedback reference answer 不信任模型原始字段，只由 resolved claims 构建；supported、mixed、all-insufficient 均有自动化覆盖。"
  - "API 和 Web 健康后才启动 Worker；Worker 创建后的失败不直接强杀，回滚超时保留 START_FAILED_STOP_PENDING state 与 API/Web。"
  - "标准 npm test 不运行 fixed-port managed smoke；独立 test:v1-managed-windows 覆盖正常生命周期、启动异常回滚和超时诊断保留。"
  - "TRANSACTION_FAILED、关闭数据库及未知持久化错误返回安全 api.v1 INTERNAL_ERROR/500，既有 400/404/409 业务映射不回退。"
  - "fast-uri 生产依赖解析不低于 3.1.4/4.1.1，security 与 npm audit --omit=dev 无 high vulnerability。"
required_tests:
  - npm run test:v1-managed-windows
  - npm run lint
  - npm run typecheck
  - npm run build
  - npm test
  - npm run test:v1-smoke
  - npm run test:e2e
  - npm audit --omit=dev
  - git diff --check
manual_acceptance:
  - "Chrome/Edge 真实 PDF viewer 页码定位和同页重载仍由人工复验。"
  - "DeepSeek 真实生成和 Claim/Evidence 语义支持关系仍由人工复验。"
  - "Windows 实机 start/check/stop 使用固定端口，只有端口空闲时才能执行；不得终止外部占用进程来制造通过。"
security_considerations:
  - "fast-uri 生产依赖解析必须避开受影响版本；不得降低 audit level 或删除 security/audit 门禁。"
  - "不得读取、打印、保存或请求真实 API key；自动化仅用 Mock/fake secret。"
  - "所有临时 DB、content root、端口和进程必须隔离，不访问真实 acceptance 路径。"
risks:
  - risk: "浏览器内置 PDF viewer 对 fragment 的支持因浏览器而异。"
    mitigation: "动态 iframe key 强制重载，并提供正确 URL 的新标签页降级。"
  - risk: "跨 owner 修改面较大。"
    mitigation: "主控 Agent 唯一写入，按 Web/API/Worker/Evidence/ops 顺序集成并逐批测试。"
rollback_plan: "按逻辑提交逐个 revert；不涉及 migration 或公共 Schema，保留 5473ca0 release gate 基线。"
deliverables:
  - "上一轮提交已推送 origin/fix/v1-stabilization；第三轮形成新的本地逻辑提交与 Level 3 证据，不 push、不创建 PR/tag/Release。"
  - "本地 fix/v1-stabilization 逻辑提交、Level 3 摘要和完整测试证据；不 push、不创建 PR/tag/Release。"
