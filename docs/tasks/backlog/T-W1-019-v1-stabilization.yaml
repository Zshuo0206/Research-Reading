task_id: T-W1-019
title: "V1.0 Stabilization"
owner_role: primary-agent
status: BLOCKED
wave: 1

objective: "基于 5473ca0 对 V1.0 真实本地用户闭环执行系统稳定化，修复 PDF 导航可观察性、Web 假绿、Evidence 语义、API 错误一致性、BYOK 默认边界、Worker 可靠性和 Windows 本地运维。"
background: "T-W1-018 已完成 release gate 阻断修复与 Evidence 页码 URL 去重，但真实浏览器仍可能忽略 iframe hash-only 变化；当前自动化大量依赖前端 mock，API 错误、浏览器 session-key、Worker readiness 和本地启动体验仍需收口。"
scope:
  - "增强 PDF Evidence 导航：动态 key/reload token、可见目标与加载状态、失败说明和新标签页降级。"
  - "修复 Web mock 状态机假绿，并增加真实 API+Worker+SQLite+PDF 的无外部网络 smoke。"
  - "使 Mock claim 与 canonical source quote 确定性对应，保持真实模型 exact-match 和 Evidence gate 不变。"
  - "统一 API api.v1 错误 envelope，默认禁用浏览器 session-key，保持环境变量 secret 为 V1 默认。"
  - "强化 Worker readiness、循环异常隔离、有界退避、AbortSignal 和 graceful shutdown。"
  - "提供 Windows start/stop/check 脚本并更新本地运行文档。"
  - "第二轮定向修复：每次运行独立 stop file、固定端口和真实 Worker ready JSON；Guided Learning 非法输入安全映射；reference answer 仅由 resolved claims 重建。"
  - "第三轮定向修复：Worker 最后启动且启动失败通过 control file 回滚；managed smoke 与 npm test 分层；持久化故障安全映射为 500；定向修复 fast-uri advisory。"
out_of_scope:
  - "第三轮不扩展为通用 Worker lease、orphan recovery、动态端口、部署系统或架构重构。"
  - "公共 Schema、数据库 migration、Evidence gate 放宽、PDF.js 重构、OCR、远程部署、多用户、ANALYZE、TRANSFER、外部模型自动测试。"
