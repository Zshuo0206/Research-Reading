task_id: T-W1-001
title: "冻结 Wave 1 公共契约、BYOK 配置与状态机"
owner_role: contract-agent
status: REVIEW
wave: 1

objective: "将 wave1.v1 技术基线落实为可校验的 JSON Schema、错误模型、状态机和兼容 fixture。"
background: "Wave 0 只有占位契约；API、Worker、Web、ModelGateway 和评测必须先共享版本化边界。"
scope:
  - "定义 api.v1、document.v1、job.v1、question-plan.v1、answer.v1、evidence.v1、model-gateway.v1。"
  - "定义项目、文档、任务、问题、回答、revision、review_status、verification_status 和断言类型。"
  - "为 question-plan.v1 定义 document_language、retrieval_queries 和 retrieval_terms。"
  - "为 model-gateway.v1 定义 context_span_id/候选引用，禁止模型提交最终 char offset。"
  - "将 ModelGateway 定义为完整 REQUEST/RESPONSE discriminated union；模型只返回 QuestionPlanDraft/AnswerDraft，不返回持久化 ID、revision、时间、hash 或审核状态。"
  - "定义 BYOK provider 配置、OpenAI-compatible 预设、自定义 HTTPS base_url、运行时 secret ref 与连接测试配置；普通 Schema 不得含明文 API Key。"
  - "定义 canonical_page_text、Unicode code point offset、右开区间、quote 和 SHA-256 编码规则。"
  - "提供 Schema 校验、错误码和版本兼容测试样例。"
out_of_scope:
  - "实现 API、PDF 提取、模型调用或 Web 页面。"
  - "改变已批准产品范围或引入多用户权限。"
dependencies: []

writable_paths:
  - packages/contracts/wave1/**
  - tests/contracts/**
  - docs/contracts/**
read_only_paths:
  - docs/architecture/wave1-technical-plan.md
  - docs/rfcs/RFC-W1-001-technical-foundation-and-contract-baseline.md
forbidden_paths:
  - apps/**
  - package.json
  - package-lock.json
contract_version: "wave1.v1"

inputs:
  - name: "技术基线"
    type: "architecture-plan"
    source: "docs/architecture/wave1-technical-plan.md"
outputs:
  - name: "Wave 1 JSON Schema 与兼容 fixture"
    type: "versioned-contracts"
    destination: "packages/contracts/wave1/**"

acceptance_criteria:
  - "所有 Schema 明确版本、必填字段、枚举和 additionalProperties 策略。"
  - "EvidenceSpan 能表达 document version、页码、canonical_page_text、稳定 offset、quote、hash 和 extraction profile。"
  - "PAPER_FACT、AUTHOR_CLAIM、AGENT_INFERENCE 和 INSUFFICIENT_EVIDENCE 有明确约束。"
  - "问题/回答使用 revision + review_status + verification_status，MODIFIED 不是稳定状态。"
  - "Job 取消、失败、重试和 lease 恢复迁移有可测试定义。"
  - "Mock Gateway 使用 model-gateway.v1；真实统一 OpenAI-compatible BYOK 适配器属于 Wave 1，但真实外部调用仅进入人工验收。"
  - "契约为统一 OpenAI-compatible BYOK 适配器保留 provider、base_url、model、超时和 token/字符上限；连接测试和密钥边界由 T-W1-004B 实现。"
  - "真实 BYOK request 顶层只允许一个 runtime_secret_ref 且必须提供；Mock request 不携带 secret ref。"
required_tests:
  - "JSON Schema 正例/反例校验。"
  - "错误码和状态机非法转换测试。"
  - "契约版本兼容性检查。"
manual_acceptance:
  - "QA 独立检查所有消费者字段与 Schema 一致。"
security_considerations:
  - "契约不得包含明文 API Key、token、原始 PDF 路径或用户身份敏感字段；secret ref 与普通持久化配置分离。"
  - "用户未确认状态必须可被消费者识别。"
risks:
  - risk: "过早冻结字段导致后续实现绕过契约。"
    mitigation: "只冻结闭环所需最小字段；新增不兼容字段必须走 RFC。"
rollback_plan: "保持 wave0.v1 不变；在未被消费者使用前撤回未集成的 wave1.v1 文件。"
deliverables:
  - "版本化 JSON Schema。"
  - "契约校验与兼容 fixture。"
  - "契约 owner 交接报告。"
