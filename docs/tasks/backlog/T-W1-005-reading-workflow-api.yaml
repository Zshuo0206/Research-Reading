task_id: T-W1-005
title: "实现快速问答与引导式学习工作流 API"
owner_role: workflow-backend-agent
status: DRAFT
wave: 1

objective: "把快速问答和 V1.0 引导式学习串成可恢复 API 闭环，并保留服务端证据验证、确认边界和幂等写操作。"
background: "V1.0 同时保留快速问答模式与引导式学习模式；引导式学习增加学习目标、候选方向、固定路线、逐题回答/跳过、点评、参考答案和阶段总结。"
scope:
  - "实现项目创建和 METHOD_LEARNING 模式约束。"
  - "保留快速问答的问题计划生成、确认/修改/拒绝和幂等写操作。"
  - "实现引导式学习的学习目标、2–3 个候选方向、方向选择和固定三阶段路线；只允许进入理解内容阶段。"
  - "实现第一阶段 3–7 道开放式问题的顺序展示、作答/不会跳过、点评、参考答案、证据、当前回答修正和下一题。"
  - "实现第一阶段完成后的简短阶段总结，并允许同一篇论文新建另一个方向。"
  - "实现快速问答的至少一个确认问题回答任务、证据展示和回答确认/修改/拒绝。"
  - "实现统一错误模型、本地工作区 project binding 检查和审计事件。"
out_of_scope:
  - "分析评价和迁移应用阶段的真实流程、OCR、复杂表格/公式/图片理解。"
  - "动态难度、追问、评分、掌握等级、学习历史、回答版本历史和复杂报告。"
  - "资产库、导出、多篇综合和协作权限。"
dependencies:
  - task_id: T-W1-001
    reason: "API 字段、错误和状态机必须先冻结。"
  - task_id: T-W1-003A
    reason: "需要持久化、Job runtime 和本地工作区绑定。"
  - task_id: T-W1-003B
    reason: "需要 READY document version、canonical text 和 Evidence 物化服务。"
  - task_id: T-W1-004A
    reason: "问题计划和回答由 ModelGateway 生成并验证。"
  - task_id: T-W1-004B
    reason: "Wave 1 真实 BYOK 生成路径需要统一 OpenAI-compatible adapter。"
  - task_id: T-W1-010
    reason: "V1.0 开发需求基线定义快速问答与引导式学习的产品边界。"
  - task_id: T-W1-011
    reason: "学习会话、逐题状态和模式分支必须消费已审查的版本化契约。"

writable_paths:
  - apps/api/src/projects/**
  - apps/api/src/workflow/**
  - apps/api/src/http/**
  - tests/integration/workflow/**
  - tests/e2e/api/**
read_only_paths:
  - packages/contracts/wave1/**
  - packages/model-gateway/**
  - packages/pdf/**
forbidden_paths:
  - apps/web/**
  - apps/api/src/document-ingest/**
  - apps/worker/src/extraction/**
contract_version: "api.v1 + question-plan.v1 + answer.v1"

inputs:
  - name: "项目、文档和用户确认操作"
    type: "versioned-api-request"
    source: "Web or API test"
outputs:
  - name: "可观察的任务和草稿/确认结果"
    type: "versioned-api-response"
    destination: "Web, audit_events, SQLite"

acceptance_criteria:
  - "快速问答和引导式学习由服务端区分，非法模式/阶段转换返回统一错误。"
  - "引导式学习可完成目标输入、方向选择、路线展示和第一阶段 3–7 道问题的顺序闭环。"
  - "引导式学习支持回答、不会/跳过、点评、参考答案、服务端验证的 quote 和页码/稳定位置。"
  - "引导式学习允许只保留当前最新版回答并主动进入下一题，完成后生成简短阶段总结。"
  - "快速问答用户可确认、修改或拒绝问题，并只能为确认问题生成回答。"
  - "问题和回答通过 revision、review_status、verification_status 表达编辑/验证；MODIFIED 不作为稳定状态。"
  - "回答能区分三类断言；快速问答用户确认前不会标记为正式研究资产。"
  - "重复写请求返回幂等结果，非法状态转换返回统一错误。"
required_tests:
  - "API 契约、双模式状态机、幂等、本地工作区 project binding 和错误模型测试。"
  - "Mock 快速问答和引导式学习端到端闭环测试。"
  - "候选方向数量、阶段锁定、问题顺序、不会/跳过、阶段总结和新方向会话测试。"
  - "外部 gateway 关闭、失败、预算超限和无证据拒答测试。"
manual_acceptance:
  - "QA 从空库独立走通最小闭环并保存请求/响应证据。"
security_considerations:
  - "接口不泄露内部路径、堆栈、密钥或不必要的全文。"
  - "本地操作员和 workspace-local project binding 由服务端检查；不宣称存在远程用户认证。"
  - "草稿/确认/verification 状态由服务端决定，不能由客户端伪造。"
risks:
  - risk: "工作流过早抽象成资产库或多模式系统，扩大范围。"
    mitigation: "只实现 METHOD_LEARNING 和最小状态机；扩展需新 RFC。"
rollback_plan: "按契约版本回退 API/Worker；保留数据库迁移的前向修复，不删除用户文件。"
deliverables:
  - "快速问答与引导式学习项目工作流 API。"
  - "学习目标、方向、路线、逐题回答和阶段总结逻辑。"
  - "任务状态、审计和确认逻辑。"
  - "闭环集成/E2E 测试。"
