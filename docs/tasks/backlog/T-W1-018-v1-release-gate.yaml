id: T-W1-018
task_id: T-W1-018
title: "V1.0 Release Gate"
owner_role: primary-agent
status: IMPLEMENTING
wave: 1
objective: "对已经进入 main 的 V1.0 本地单用户产品执行最终发布 Gate，包括真实外部 BYOK 人工验收、产品人工检查、安全检查、发布材料和最终发布判定。"
background: "T-W1-017 已完成真实 BYOK 适配、四类 Guided Learning operation、source verification、PDF 恢复和页码定位的技术实现；本任务只负责发布 Gate，不新增产品功能。"
scope:
  - "在全新临时目录和 SQLite 数据库上验证 migration 001–006、API、Worker、Web、真实 PDF、Mock Guided Learning、快速问答、刷新/重启恢复、RETRY、EDIT_ANSWER、PDF 恢复和 Evidence 页码跳转。"
  - "记录自动化发布 Gate、fake provider 集成、secret 边界、loopback/CORS/PDF endpoint 安全检查和发布材料。"
  - "记录真实 BYOK 凭据是否由安全环境提供，只记录可用性、provider、model 和脱敏 endpoint；不得输出或持久化凭据。"
  - "记录浏览器真实 BYOK、Evidence 人工抽查、产品负责人批准和最终 V1.0 发布判定。"
  - "调查真实 BYOK feedback 成功但 claims 全部降级为 INSUFFICIENT_EVIDENCE、Evidence projection 为空的 Evidence grounding/resolution 阻断；只增加安全诊断，不扩大产品功能范围。"
  - "修复正式 Worker 入口的持久 SQLite Job 轮询、idle wait、顺序 runOnce 和 graceful shutdown。"
  - "修复真实科研 PDF 上传的默认 1 MiB bodyLimit 阻断：仅上传路由允许最大 32 MiB，并为超限请求返回 api.v1 413。"
  - "修复 DeepSeek V4 Guided Learning 结构化 JSON 响应兼容性：关闭仅限 DeepSeek 的 thinking，强化 JSON 示例和安全响应诊断，不改变其他 OpenAI-compatible provider。"
  - "修复 Guided Learning RETRY 反馈 Job 丢失当前题目指针的问题；反馈 Job 必须携带当前 question_id/order，其他生成 Job 不得携带，并在 Worker 调用模型前 fail closed。"
  - "使用固定数据库和 Session allowlist 的一次性事务脚本恢复指定真实验收 Session；严格校验 FAILED/revision 11 前置条件，幂等重放不产生二次修改。"
out_of_scope:
  - "新产品功能、OCR、第二/第三学习阶段、ANALYZE、TRANSFER、多篇论文、远程部署、多用户、知识图谱、写作辅助、团队协作、UI 重构。"
