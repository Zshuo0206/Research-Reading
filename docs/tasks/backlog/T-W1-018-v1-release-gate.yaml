objective: "对已经进入 main 的 V1.0 本地单用户产品执行最终发布 Gate，包括真实外部 BYOK 人工验收、产品人工检查、安全检查、发布材料和最终发布判定。"
background: "T-W1-017 已完成真实 BYOK 适配、四类 Guided Learning operation、source verification、PDF 恢复和页码定位的技术实现；本任务只负责发布 Gate，不新增产品功能。"
scope:
  - "在全新临时目录和 SQLite 数据库上验证 migration 001–006、API、Worker、Web、真实 PDF、Mock Guided Learning、快速问答、刷新/重启恢复、RETRY、EDIT_ANSWER、PDF 恢复和 Evidence 页码跳转。"
  - "记录自动化发布 Gate、fake provider 集成、secret 边界、loopback/CORS/PDF endpoint 安全检查和发布材料。"
  - "检查真实 BYOK 凭据是否已由安全环境提供；没有凭据时记录 BLOCKED_BY_MISSING_USER_CREDENTIALS，不伪造通过。"
  - "记录浏览器真实 BYOK、Evidence 人工抽查、产品负责人批准和最终 V1.0 发布判定。"
