acceptance_criteria:
  - "AUTOMATED_RELEASE_GATE 为 PASS：planning 当前 19 tasks（合并前 main 为 18）、runtime integration 26/26、BYOK/Evidence 定向 13/13、npm test 24/24、Playwright 3/3、lint、typecheck、contract、build、smoke、security 和 git diff --check 均通过。"
  - "migration 001–006 在全新 SQLite 上成功；schema version 为 6，provider config 表存在且只保存白名单字段。"
  - "API key 不进入 SQLite、Job、Session snapshot、API response、日志、URL、Git 工作区或发布材料；PDF endpoint 不接受任意文件路径；默认监听和 CORS 保持 loopback 安全边界。"
  - "真实外部 BYOK、浏览器真实 BYOK、Evidence 人工抽查和产品负责人批准分别记录 PASS 或准确阻塞状态；fake provider 和 Mock 不得替代真实验收。"
  - "当前真实 BYOK connection、directions、questions、feedback、RETRY pointer、EDIT_ANSWER 和 PDF browser upload 均记录 PASS；Evidence grounding 为 BLOCKED、HUMAN_EVIDENCE_REVIEW 为 BLOCKED_NO_VERIFIED_EVIDENCE，V1_RELEASE_STATUS 为 BLOCKED_BY_EVIDENCE_GROUNDING，不得标记 ACCEPTED、RELEASED 或 v1.0.0。"
  - "正式非 smoke Worker 持久轮询 SQLite Job 队列，默认 idle delay 为 250ms；停止时不领取新 Job，等待当前 Job 完成，只 close 一次并输出一次 stopped。"
  - "BYOK 网关对 finish_reason、content、reasoning_content 和 provider response schema 失败安全分类；Worker 诊断日志不包含 secret、prompt 或模型响应原文。"
  - "反馈 SUBMIT_ANSWER、EDIT_ANSWER、RETRY 以及方向/问题/阶段总结 RETRY 的题目指针边界、缺失指针早期拒绝、完整失败恢复和幂等重放回归测试通过。"
  - "Evidence resolution diagnostics 只记录安全的 reason 分类、计数和必要的非敏感标识；不得记录 claim text、quote、论文全文、用户答案、模型响应原文或 secret。具体第五阻断根因在诊断完成前不得宣称已确定。"
manual_acceptance:
  - "已有安全配置的 provider、HTTPS base_url、model 和 WORKFLOW_BYOK_API_KEY 时，执行连接测试及四类 Guided Learning 真实生成闭环。"
  - "逐项检查方向、问题、点评、Reference Answer、Evidence、Summary、刷新/重启恢复、RETRY、EDIT_ANSWER、快速问答和 PDF 页码跳转。"
  - "执行 npm run worker，确认 ready 后持续运行；发送 Ctrl+C 后确认 stopped 一次、正常退出且没有数据库重复 close。"
  - "人工判断 Evidence claim 与 quote 的合理相关性；服务端只保证 source verification，不宣称自动完成语义蕴含证明。"
  - "当前真实人工验收已通过 PDF 上传、BYOK connection、directions、questions、feedback、RETRY pointer、EDIT_ANSWER 和 guidedSession URL 恢复；Evidence 人工抽查因没有 VERIFIED Evidence 保持 BLOCKED。"
  - "第五阻断调查必须区分 provider/JSON 成功与 Evidence resolution 降级，不得放宽 source verification 或绕过 confirm gate。"
security_considerations:
  - "只检查凭据是否存在、provider 名称、model 名称和脱敏 endpoint；不得输出 key、Authorization header、完整环境变量、prompt 或 provider 原始响应。"
  - "不得提交 .env、数据库、content root、用户 PDF、日志、trace、截图或构建产物。"
risks:
  - risk: "真实 feedback 请求成功，但 claims 全部被安全降级为 INSUFFICIENT_EVIDENCE，当前无法确认具体 resolveClaim 降级分类。"
    mitigation: "增加 per-claim 安全 resolution reason diagnostics；保持严格 source verification 和 confirm gate，不以模糊匹配或绕过校验换取通过。"
  - risk: "真实模型输出的语义质量无法由 source verification 自动证明。"
    mitigation: "保留人工 Evidence 抽查和产品负责人批准作为发布前置条件。"
completion_criteria:
  - "自动化 Gate 和发布材料完成，工作区干净且无敏感产物。"
  - "真实 BYOK、PDF、feedback、RETRY 和 EDIT_ANSWER 人工验收结果已记录；Evidence grounding 修复、Evidence 人工抽查和产品负责人批准完成前保留明确发布阻塞状态。"
  - "不自动创建 tag、GitHub Release 或 PR；等待人类项目负责人明确决定。"
