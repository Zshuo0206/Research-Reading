wave: 0
generated_at_utc: ""
rules:
  one_writer_per_file: true
  shared_paths_locked: true
agents:
  orchestrator:
    writable_paths:
      - docs/**
      - AGENTS.md
    read_only_paths: []
  governance:
    writable_paths:
      - docs/governance/**
      - docs/templates/**
      - docs/standards/**
      - docs/quality/**
      - docs/runbooks/**
    read_only_paths:
      - AGENTS.md
  skeleton:
    writable_paths:
      - apps/**
      - packages/**
      - tests/**
      - scripts/**
      - infra/**
      - package.json
      - .env.example
      - .gitignore
    read_only_paths:
      - docs/**
  locked_paths:
    - docs/integration/ownership-map.yaml
    - package-lock.json
    - pnpm-lock.yaml
    - yarn.lock
